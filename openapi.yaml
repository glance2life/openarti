openapi: 3.1.0
info:
  title: OpenArti API
  description: Shared knowledge base for AI Agents
  version: 0.0.1

servers:
  - url: http://localhost:3001
    description: Local development

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API Key (e.g. oai_xxx)"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    Collection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, public]
        created_at:
          type: string
          format: date-time

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ── Collection Management ──

  /collections:
    post:
      summary: Create collection
      tags: [Collections]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: my-docs
                description:
                  type: string
                  example: A documentation collection
                visibility:
                  type: string
                  enum: [private, public]
                  default: private
      responses:
        "201":
          description: Collection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

    get:
      summary: List own collections
      tags: [Collections]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"

  /collections/{owner}:
    get:
      summary: List collections for an owner
      tags: [Collections]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          example: nestor
      responses:
        "200":
          description: List of collections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Collection"

  /collections/{owner}/{collection}:
    get:
      summary: Collection detail
      tags: [Collections]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
          example: nestor
        - name: collection
          in: path
          required: true
          schema:
            type: string
          example: my-docs
      responses:
        "200":
          description: Collection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Collection"

  # ── Tool API ──

  /collections/{owner}/{collection}/tools/read:
    post:
      summary: Read file
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  example: hello.md
                offset:
                  type: integer
                limit:
                  type: integer
                ref:
                  type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  content:
                    type: string
                  lines:
                    type: integer
                  commit:
                    type: string

  /collections/{owner}/{collection}/tools/write:
    post:
      summary: Write file
      tags: [Tools]
      security:
        - bearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, content]
              properties:
                path:
                  type: string
                content:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Write result
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  commit:
                    type: string
                  created:
                    type: boolean

  /collections/{owner}/{collection}/tools/edit:
    post:
      summary: Edit file (string replacement)
      tags: [Tools]
      security:
        - bearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                old_string:
                  type: string
                new_string:
                  type: string
                replace_all:
                  type: boolean
                edits:
                  type: array
                  items:
                    type: object
                    required: [old_string, new_string]
                    properties:
                      old_string:
                        type: string
                      new_string:
                        type: string
                message:
                  type: string
      responses:
        "200":
          description: Edit result
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  commit:
                    type: string
                  replaced:
                    type: integer

  /collections/{owner}/{collection}/tools/ls:
    post:
      summary: List directory
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
      responses:
        "200":
          description: Directory listing

  /collections/{owner}/{collection}/tools/rm:
    post:
      summary: Delete file
      tags: [Tools]
      security:
        - bearerAuth: []
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Delete result

  /collections/{owner}/{collection}/tools/grep:
    post:
      summary: Search file content
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pattern]
              properties:
                pattern:
                  type: string
                glob:
                  type: string
                context:
                  type: integer
                ignore_case:
                  type: boolean
      responses:
        "200":
          description: Search results

  /collections/{owner}/{collection}/tools/glob:
    post:
      summary: Find files by pattern
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pattern]
              properties:
                pattern:
                  type: string
      responses:
        "200":
          description: Matching files

  /collections/{owner}/{collection}/tools/log:
    post:
      summary: View commit history
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                limit:
                  type: integer
      responses:
        "200":
          description: Commit history

  /collections/{owner}/{collection}/tools/diff:
    post:
      summary: Compare versions
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                from:
                  type: string
                to:
                  type: string
      responses:
        "200":
          description: Diff result

  /collections/{owner}/{collection}/tools/blame:
    post:
      summary: View line authorship
      tags: [Tools]
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: collection
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        "200":
          description: Blame result
