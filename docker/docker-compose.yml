services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openarti
      POSTGRES_PASSWORD: openarti
      POSTGRES_DB: openarti
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openarti"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openarti_test
      POSTGRES_PASSWORD: openarti_test
      POSTGRES_DB: openarti_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openarti_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://openarti:openarti@postgres:5432/openarti
      STORAGE_DIR: /root/.openarti/storage
      PORT: "3001"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-in-production}
      BETTER_AUTH_URL: http://localhost:3001
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WEB_ORIGIN: http://localhost:3000
    volumes:
      - gitdata:/root/.openarti/storage
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    environment:
      OPENARTI_API_URL: http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  gitdata:
