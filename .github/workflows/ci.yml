name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openarti_test
          POSTGRES_PASSWORD: openarti_test
          POSTGRES_DB: openarti_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U openarti_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test CLI
        run: pnpm --filter openarti test

      - name: Migrate test database
        run: pnpm --filter @openarti/api db:generate && pnpm --filter @openarti/api db:migrate
        env:
          DATABASE_URL: postgresql://openarti_test:openarti_test@localhost:5433/openarti_test

      - name: Test API
        run: pnpm --filter @openarti/api test
        env:
          DATABASE_URL: postgresql://openarti_test:openarti_test@localhost:5433/openarti_test
          STORAGE_DIR: ./data/test-repos
          NODE_ENV: test
