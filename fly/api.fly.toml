app = "openarti-api"
primary_region = "nrt"

[build]
  dockerfile = "../docker/Dockerfile.api"

[env]
  PORT = "3001"
  STORAGE_DIR = "/data/storage"
  BETTER_AUTH_URL = "https://openarti-api.fly.dev"
  WEB_ORIGIN = "https://openarti-web.fly.dev"
  ALLOW_REGISTRATION = "false"

[[mounts]]
  source = "openarti_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
